name: SignSure CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run linting (flake8)
      run: |
        pip install flake8
        flake8 signsure/ --max-line-length=110 --ignore=E501,W503

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=signsure --cov-report=xml --cov-report=term-missing

    - name: Check coverage threshold (>85%)
      run: |
        pytest tests/ --cov=signsure --cov-fail-under=85

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run attack simulation tests
      run: |
        pip install -r requirements.txt
        pytest tests/test_attacks.py -v
